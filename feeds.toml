# feeds.toml — RSS feeds for recipe discovery
#
# User-curated. RSS feed URLs and tags, read by fetch_rss_discoveries. The tool
# returns a candidate POOL with no taste score; the AGENT judges taste fit
# against the taste profile and picks the 1–2 worth importing. weight is passed
# through as a trust/rank hint for the agent. See docs/SCHEMAS.md.
#
# The 5 feeds below were validated 2026-06-10: each has a live feed AND recipe
# pages that emit schema.org Recipe JSON-LD (so import_recipe works on their
# links). Sites that bot-wall automated fetches (Serious Eats, Food52) or emit no
# JSON-LD (Smitten Kitchen) were excluded — recovering those is roadmap Change 14
# (newsletter email discovery). Add global-cuisine feeds here as you find ones
# with live feeds + JSON-LD.

