# substitutions.toml — standing substitution rules
#
# User-curated. The agent edits this ONLY when explicitly directed.
# Rules are applied deterministically by propose_substitutions (inventory and
# sale modes). The agent never auto-substitutes without confirmation.
# See docs/SCHEMAS.md for the full schema.
#
# Example rules (uncomment and edit):
#
# [[rules]]
# ingredient = "salmon"
# acceptable_substitutes = ["trout", "arctic char", "mahi mahi"]
# unacceptable_substitutes = ["tilapia"]    # explicit no-go
# notes = "Prefer wild over farmed for any of these"
#
# [[rules]]
# ingredient = "olive oil"
# acceptable_substitutes = ["extra virgin olive oil"]
# unacceptable_substitutes = ["vegetable oil", "canola oil"]
#
# [[rules]]
# ingredient = "mascarpone"
# acceptable_substitutes = []               # no acceptable sub — flag and ask
# notes = "If unavailable, ask before falling back"
