# stockup.toml — bulk-buy watchlist
#
# Items worth buying in bulk when on sale, with baseline prices and trigger
# thresholds. Used to surface stockup alerts during menu generation when the
# Kroger flyer shows a watched item at or below buy_at_or_below.
# See docs/SCHEMAS.md for the full schema.
#
# freezer_capacity_estimate = "moderate"     # tight | moderate | spacious
#
# Example items (uncomment and edit):
#
# [[items]]
# name = "chicken thighs"
# unit = "lb"
# baseline_price = 3.99
# buy_at_or_below = 2.99
# typical_purchase = "5 lb"
# notes = "Bone-in skin-on preferred"
#
# [[items]]
# name = "salmon"
# unit = "lb"
# baseline_price = 12.99
# buy_at_or_below = 9.99
# typical_purchase = "2 lb"
# notes = "Wild only"

