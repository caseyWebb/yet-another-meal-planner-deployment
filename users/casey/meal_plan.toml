# meal_plan.toml — transient, recipe-grain COMMITTED COOK intent.
#
# What the agent has agreed to cook next. Distinct from grocery_list.toml (the
# ingredient-grain BUY list): a planned recipe whose ingredients are all in the
# pantry still belongs here even though nothing gets bought. Rows are cleared as
# they resolve — removed when the recipe is cooked (logged to cooking_log.toml),
# or dropped when abandoned. The session-start stale-planned reconcile only
# surfaces DUE rows (planned_for on/before today, or unset). Agent-writable
# side-effect file. See docs/SCHEMAS.md.
#
# Fields:
#   recipe       — slug (required)
#   planned_for  — ISO date the cook is slated for (optional)
#
# Example entries (uncomment and edit):
#
# [[planned]]
# recipe = "arroz-caldo"
# planned_for = "2026-06-10"
