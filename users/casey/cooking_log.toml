# cooking_log.toml — durable, append-only COOKING log (not an eating log).
#
# One entry per cooking event or at-home convenience meal. Eating out is NOT
# logged; leftovers of an already-logged cook are NOT re-logged (one cook that
# feeds several meals is one entry). This is the trend spine retrospective()
# reads, and the source last_cooked is derived from (last_cooked == the max
# entry date for a recipe slug). Agent-writable side-effect file. See
# docs/SCHEMAS.md.
#
# Fields:
#   date    — ISO date (required)
#   type    — recipe | ready_to_eat | ad_hoc (required)
#   recipe  — slug; present iff type = recipe (protein/cuisine looked up from the
#             recipe index, never duplicated here)
#   name    — present for ready_to_eat / ad_hoc
#   protein, cuisine — optional inline dimensions for non-recipe entries so they
#             still count in retrospective mixes
#
# Example entries (uncomment and edit):
#
# [[entries]]
# date = "2026-06-09"
# type = "recipe"
# recipe = "arroz-caldo"
#
# [[entries]]
# date = "2026-06-08"
# type = "ready_to_eat"
# name = "Kroger frozen lasagna"
#
# [[entries]]
# date = "2026-06-07"
# type = "ad_hoc"
# name = "fridge-clearout fried rice"
# protein = "mixed"
# cuisine = "chinese"
