# pantry.toml — current inventory
#
# Live inventory of what's in the kitchen. Agent-writable: updated as a side
# effect of menu generation and ad-hoc messages ("I ran out of olive oil").
# See docs/SCHEMAS.md for the full schema.
#
# quantity is intentionally loose: "full" | "partial" | "low" | "<count>".
# prepared_from is set for cooked/prepared items (faster perishability profile),
# naming the recipe slug that produced it. last_verified_at resets when the user
# confirms the item is still present during a pantry confirmation pass.
#
# Example entries (uncomment and edit as inventory is added):
#
# [[items]]
# name = "olive oil"
# category = "pantry"             # pantry | fridge | freezer | spices
# quantity = "partial"            # full | partial | low | "<count>"
# added_at = "2025-04-01"
# last_verified_at = "2025-05-12"
# prepared_from = null            # slug if cooked/prepared from a recipe
#
# [[items]]
# name = "ground beef"
# category = "freezer"
# quantity = "3 lb"
# added_at = "2025-05-10"
# last_verified_at = "2025-05-10"
# prepared_from = null
#
# [[items]]
# name = "cooked rice"
# category = "fridge"
# quantity = "partial"
# added_at = "2025-05-12"
# last_verified_at = "2025-05-12"
# prepared_from = "salmon-with-rice"

