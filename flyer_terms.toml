# flyer_terms.toml — broad scan terms for serendipitous sale discovery
#
# User-curated. The agent edits this ONLY when explicitly directed (it may
# suggest additions, but never writes on its own). See docs/SCHEMAS.md.
#
# kroger_flyer has no flyer/circular endpoint to read; it synthesizes a sale
# list by searching terms and keeping products where promo > 0. These broad
# category terms widen the net past the precise, context-derived terms (current
# menu ingredients, stockup watchlist, substitution candidates) so sales on
# things you didn't ask about can still surface. Each term is scanned a few
# pages deep; the scan is relevance-ranked, not discount-sorted, so it samples
# the head of each category rather than finding every deep sale.
#
# A flat list of terms. Absent or empty → kroger_flyer still runs over the
# precise terms and returns a smaller list rather than erroring.

terms = [
  "fruit",
  "berries",
  "vegetables",
  "smoothie blends",
  "frozen fruit",
  "frozen vegetables",
  "frozen meals",
  "frozen dinners",
  "frozen bread",
  "bread",
  "seltzer",
  "cheese",
  "yogurt",
  "chicken",
  "ground beef",
  "salmon",
  "fish",
  "pasta",
  "coffee",
  "snacks",
  "ice cream",
  "canned tomatoes",
  "canned beans",
  # Ready-to-eat categories — so kroger_flyer surfaces on-sale heat-and-eat /
  # grab-and-go items the agent can offer as opportunity buys and draft into
  # ready_to_eat/*.toml (Change 10 folded fetch_flyer_featured into this scan).
  "rotisserie chicken",
  "deli prepared",
  "prepared salads",
  "frozen pizza",
  "frozen burritos",
  "soup",
  "sushi",
]
