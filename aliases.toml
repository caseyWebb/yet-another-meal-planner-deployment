# aliases.toml — ingredient name canonicalization
#
# Maps ingredient name variants to a canonical form, used by the Kroger matching
# pipeline's normalization step. User-curated; the agent may suggest additions
# during matching runs but edits this ONLY when explicitly directed.
# See docs/SCHEMAS.md for the full schema.
#
# Example aliases (uncomment and edit):
#
# [aliases]
# "EVOO" = "olive oil"
# "extra virgin olive oil" = "olive oil"
# "chx thighs" = "chicken thighs"
# "chicken thigh" = "chicken thighs"
# "cherry tomato" = "cherry tomatoes"
