# Deploy the grocery-mcp Worker AND publish the plugin marketplace. The deploy
# logic is a reusable workflow in the code repo (caseyWebb/groceries-agent); this
# thin caller overlays THIS repo's wrangler.jsonc onto the upstream source, deploys,
# then builds the plugin with this operator's connector URL baked in and commits it
# to this repo (the marketplace). It runs in this repo with this repo's
# CLOUDFLARE_API_TOKEN — the public code repo holds no secrets. Pin @main to a
# release tag if you prefer stability over auto-updates.
name: Deploy Worker

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

# contents: write so the deploy can pin auto-provisioned KV/D1 ids back into
# wrangler.jsonc and publish the plugin bundle to this repo.
permissions:
  contents: write

jobs:
  deploy:
    uses: caseyWebb/groceries-agent/.github/workflows/data-deploy.yml@main
    secrets: inherit # passes CLOUDFLARE_API_TOKEN (+ optional Kroger creds)
    with:
      config_path: wrangler.jsonc
      # Connector host (e.g. groceries-mcp.caseywebb.xyz). The deploy bakes
      # https://<WORKER_HOST>/mcp into the published plugin and stamps the badge.
      worker_host: ${{ vars.WORKER_HOST }}
