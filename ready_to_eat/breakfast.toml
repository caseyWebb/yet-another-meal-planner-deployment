# ready_to_eat/breakfast.toml — ready-to-eat breakfast catalog
#
# Acceptable ready-to-eat breakfast options. The agent adds drafts as discovery
# surfaces them (status = "draft"); the user dispositions them to active or
# rejected. sku is populated after the first cart write.
# See docs/SCHEMAS.md for the full schema.
#
# Example items (uncomment and edit):
#
# [[items]]
# name = "Kroger breakfast burrito (frozen)"
# sku = null                       # populated after first cart write
# category = "frozen"
# status = "active"                # active | draft | rejected
# added_at = "2025-04-01"
# discovered_at = null             # set only for drafts
# discovery_source = null
# brand = "Kroger"
# notes = "Heat 90s in microwave"
#
# [[items]]
# name = "Murray's overnight oats"
# sku = null
# category = "refrigerated"
# status = "draft"
# added_at = "2025-05-15"
# discovered_at = "2025-05-15"
# discovery_source = "kroger-flyer-featured"
# brand = "Murray's"
# notes = null
#
# [variety_rules]
# max_per_category_per_week = 2
# preferred_rotation_days = 3      # don't suggest the same item within N days
