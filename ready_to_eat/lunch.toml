# ready_to_eat/lunch.toml — ready-to-eat lunch catalog
#
# Acceptable ready-to-eat lunch options. The agent adds drafts as discovery
# surfaces them (status = "draft"); the user dispositions them to active or
# rejected. sku is populated after the first cart write.
# See docs/SCHEMAS.md for the full schema.
#
# Example items (uncomment and edit):
#
# [[items]]
# name = "Kroger Deli rotisserie chicken"
# sku = null                       # populated after first cart write
# category = "deli"
# status = "active"                # active | draft | rejected
# added_at = "2025-04-01"
# discovered_at = null             # set only for drafts
# discovery_source = null
# brand = "Kroger"
# notes = "Good base for quick salads/wraps"
#
# [variety_rules]
# max_per_category_per_week = 2
# preferred_rotation_days = 3      # don't suggest the same item within N days
