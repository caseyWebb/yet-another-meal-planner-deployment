# discovery_sources.toml — shared allowlist for inbound newsletter discovery.
# [[members]] = trusted friend-group addresses (anything they forward gets indexed).
# [[senders]] = trusted newsletter senders (auto-forwarded mail from them gets indexed).
# Anyone trusted with the agent MCP may widen this via update_discovery_sources.
# Add entries below, e.g.:
#   [[members]]
#   address = "you@example.com"
#   name = "You"
#   [[senders]]
#   address = "cooking@nytimes.com"
#   name = "NYT Cooking"

senders = []

[[members]]
address = "casey@dirtbag.social"
name = "Casey"

